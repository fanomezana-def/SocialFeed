{% extends 'base.html' %}
{% block title %}Nouveau mot de passe — SocialFeed{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <h2 class="auth-title">Nouveau mot de passe</h2>
  <form method="POST" class="auth-form">
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <div class="input-pass-wrap">
        <input type="password" name="password" id="np1" required placeholder="Min. 6 caractères" class="form-input">
        <button type="button" class="pass-eye" onclick="togglePass('np1',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmer</label>
      <input type="password" name="confirm_password" required placeholder="••••••••" class="form-input">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Réinitialiser</button>
  </form>
</div>
{% endblock %}
