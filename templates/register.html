{% extends 'base.html' %}
{% block title %}Inscription — SocialFeed{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <h2 class="auth-title">Créer un compte</h2>
  <form method="POST" class="auth-form">
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" name="username" required placeholder="johndoe" class="form-input">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="votre@email.mg" class="form-input">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-pass-wrap">
        <input type="password" name="password" id="regPass" required placeholder="Min. 6 caractères" class="form-input">
        <button type="button" class="pass-eye" onclick="togglePass('regPass',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" name="confirm_password" required placeholder="••••••••" class="form-input">
    </div>
    <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
  </form>
  <div class="auth-links">
    Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
  </div>
</div>
{% endblock %}
