{% extends 'base.html' %}
{% block title %}Mot de passe oublié — SocialFeed{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <h2 class="auth-title">Mot de passe oublié</h2>
  <p class="auth-subtitle">Entrez votre email pour recevoir un lien de réinitialisation.</p>
  <form method="POST" class="auth-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="votre@email.mg" class="form-input">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Envoyer le lien</button>
  </form>
  <div class="auth-links"><a href="{{ url_for('login') }}">← Retour</a></div>
</div>
{% endblock %}
